<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>Guess the Flag</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100 flex items-center justify-center p-4">
  <main class="w-full max-w-md">
    <section class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
      <!-- App-like top bar -->
      <div class="sticky top-0 z-10 backdrop-blur bg-white/80 border-b border-slate-100">
        <div class="px-5 py-4">
          <h1 class="text-xl font-semibold tracking-tight text-slate-900">Guess the Flag</h1>
          <p class="text-xs text-slate-600">Tap an answer. Build your streak.</p>
        </div>

        <!-- Controls row -->
        <div class="px-5 pb-4 flex items-center gap-3">
          <label class="text-xs text-slate-600 w-20">Continent</label>
          <select id="continentSelect"
            class="flex-1 rounded-2xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-800">
            <option value="All">All</option>
            <option value="Africa">Africa</option>
            <option value="Americas">Americas</option>
            <option value="Asia">Asia</option>
            <option value="Europe">Europe</option>
            <option value="Oceania">Oceania</option>
          </select>
        </div>
      </div>

      <div class="p-5">
        <!-- Score row -->
        <div class="flex items-center justify-between mb-3">
          <div class="text-sm text-slate-600">
            Score: <span id="score" class="font-semibold text-slate-900">0</span>
          </div>

          <div class="text-sm text-slate-600 flex items-center gap-2">
            <span>Streak: <span id="streak" class="font-semibold text-slate-900">0</span></span>
            <span id="flame" class="hidden select-none" aria-hidden="true">🔥</span>
          </div>
        </div>

        <!-- Flag container (no crop) -->
        <div class="rounded-2xl border border-slate-200 bg-slate-50 flex items-center justify-center h-44 overflow-hidden">
          <img id="flagImg" class="max-h-full max-w-full object-contain p-3 opacity-100 scale-100 transition duration-200 ease-out"
               alt="Flag" />
        </div>

        <div id="choices" class="grid gap-3 mt-4"></div>

        <div id="feedback" class="mt-4 text-sm rounded-2xl px-4 py-3 hidden"></div>

        <div class="mt-4 flex gap-3">
          <button id="nextBtn"
            class="flex-1 rounded-2xl bg-slate-900 text-white py-3 font-medium active:scale-[0.99] transition">
            Next
          </button>
          <button id="resetBtn"
            class="rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-700 font-medium active:scale-[0.99] transition">
            Reset
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const elFlag = document.getElementById("flagImg");
    const elChoices = document.getElementById("choices");
    const elFeedback = document.getElementById("feedback");
    const elScore = document.getElementById("score");
    const elStreak = document.getElementById("streak");
    const elFlame = document.getElementById("flame");
    const btnNext = document.getElementById("nextBtn");
    const btnReset = document.getElementById("resetBtn");
    const continentSelect = document.getElementById("continentSelect");

    let ALL_FLAGS = [];
    let ACTIVE_FLAGS = [];
    let deck = [];
    let current = null;
    let locked = false;
    let score = 0;
    let streak = 0;
    let lastCode = null;

    function randInt(max) { return Math.floor(Math.random() * max); }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function showFeedback(ok, text) {
      elFeedback.classList.remove("hidden");
      elFeedback.className =
        "mt-4 text-sm rounded-2xl px-4 py-3 " + (ok
          ? "bg-emerald-50 text-emerald-800 border border-emerald-200"
          : "bg-rose-50 text-rose-800 border border-rose-200");
      elFeedback.textContent = text;
    }

    function clearFeedback() {
      elFeedback.classList.add("hidden");
      elFeedback.textContent = "";
    }

    function updateFlame() {
      if (streak >= 5) {
        elFlame.classList.remove("hidden");
        const size = Math.min(1.35, 1 + (streak - 5) * 0.05);
        elFlame.style.transform = `scale(${size})`;
        elFlame.style.transition = "transform 160ms ease-out";
      } else {
        elFlame.classList.add("hidden");
        elFlame.style.transform = "scale(1)";
      }
    }

    function buildDeck() {
      deck = shuffle([...Array(ACTIVE_FLAGS.length).keys()]);
    }

    function drawNextFlag() {
      if (ACTIVE_FLAGS.length === 0) return null;
      if (deck.length === 0) buildDeck();

      let idx = deck.shift();

      // avoid immediate repeat
      if (ACTIVE_FLAGS.length > 1 && ACTIVE_FLAGS[idx].code === lastCode && deck.length > 0) {
        const idx2 = deck.shift();
        deck.push(idx);
        idx = idx2;
      }

      lastCode = ACTIVE_FLAGS[idx].code;
      return ACTIVE_FLAGS[idx];
    }

    function pickWrongOptions(correctName, n) {
      const pool = ACTIVE_FLAGS.filter(f => f.name !== correctName);
      const picked = [];
      while (picked.length < n && pool.length) {
        const idx = randInt(pool.length);
        picked.push(pool.splice(idx, 1)[0]);
      }
      return picked;
    }

    function animateFlagChange() {
      elFlag.classList.remove("opacity-100", "scale-100");
      elFlag.classList.add("opacity-0", "scale-[0.985]");
      window.setTimeout(() => {
        elFlag.classList.remove("opacity-0", "scale-[0.985]");
        elFlag.classList.add("opacity-100", "scale-100");
      }, 70);
    }

    function applyContinentFilter() {
      const choice = continentSelect.value;
      ACTIVE_FLAGS = (choice === "All")
        ? [...ALL_FLAGS]
        : ALL_FLAGS.filter(f => f.region === choice);

      lastCode = null;
      buildDeck();
      renderQuestion();
    }

    async function loadCountries() {
      const url = "https://restcountries.com/v3.1/all?fields=name,cca2,region";
      try {
        const res = await fetch(url, { cache: "force-cache" });
        if (!res.ok) throw new Error("Bad response");
        const data = await res.json();

        ALL_FLAGS = data
          .map(c => ({
            name: (c?.name?.common || "").trim(),
            code: (c?.cca2 || "").toLowerCase(),
            region: (c?.region || "Other").trim(),
          }))
          .filter(c =>
            c.name &&
            c.code &&
            c.code.length === 2 &&
            c.region &&
            c.region !== "Antarctic"
          )
          .sort((a, b) => a.name.localeCompare(b.name));

        if (ALL_FLAGS.length < 100) throw new Error("Too few loaded");
      } catch (e) {
        // fallback
        ALL_FLAGS = [
          { name: "Australia", code: "au", region: "Oceania" },
          { name: "Japan", code: "jp", region: "Asia" },
          { name: "Brazil", code: "br", region: "Americas" },
          { name: "Canada", code: "ca", region: "Americas" },
          { name: "South Africa", code: "za", region: "Africa" },
          { name: "Sweden", code: "se", region: "Europe" },
          { name: "Mexico", code: "mx", region: "Americas" },
          { name: "India", code: "in", region: "Asia" },
          { name: "Argentina", code: "ar", region: "Americas" },
          { name: "Greece", code: "gr", region: "Europe" },
          { name: "Norway", code: "no", region: "Europe" },
          { name: "New Zealand", code: "nz", region: "Oceania" },
        ];
      }

      applyContinentFilter();
    }

    function renderQuestion() {
      if (ACTIVE_FLAGS.length < 4) {
        elChoices.innerHTML = `<div class="text-sm text-slate-600">Not enough flags in this category.</div>`;
        return;
      }

      locked = false;
      clearFeedback();

      current = drawNextFlag();
      if (!current) return;

      animateFlagChange();
      elFlag.src = `https://flagcdn.com/w640/${current.code}.png`;
      elFlag.alt = `Flag of ${current.name}`;

      const wrong = pickWrongOptions(current.name, 3);
      const options = shuffle([current, ...wrong]);

      elChoices.innerHTML = "";
      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className =
          "w-full rounded-2xl border border-slate-200 bg-white py-3 px-4 text-left font-medium " +
          "text-slate-800 hover:bg-slate-50 hover:border-slate-300 active:scale-[0.99] transition";
        btn.textContent = opt.name;
        btn.onclick = () => handleAnswer(opt.name);
        elChoices.appendChild(btn);
      });
    }

    function handleAnswer(name) {
      if (locked) return;
      locked = true;

      const ok = name === current.name;
      if (ok) {
        score += 1;
        streak += 1;
        showFeedback(true, `Correct ✅  That’s ${current.name}.`);
      } else {
        streak = 0;
        showFeedback(false, `Nope ❌  That one is ${current.name}.`);
      }

      elScore.textContent = score;
      elStreak.textContent = streak;
      updateFlame();
    }

    continentSelect.addEventListener("change", applyContinentFilter);
    btnNext.addEventListener("click", renderQuestion);

    btnReset.addEventListener("click", () => {
      score = 0;
      streak = 0;
      elScore.textContent = "0";
      elStreak.textContent = "0";
      updateFlame();
      lastCode = null;
      buildDeck();
      renderQuestion();
    });

    (async function init() {
      await loadCountries();
      updateFlame();
      renderQuestion();
    })();
  </script>
</body>
</html>
